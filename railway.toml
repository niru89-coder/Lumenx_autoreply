# Railway service config — LumenX Auto-Reply Agent (FastAPI + background poller)
# This file lives at the repo root; the dashboard service has its own railway.toml
# inside dashboard/.

[build]
builder          = "DOCKERFILE"
dockerfilePath   = "Dockerfile"

[deploy]
startCommand     = "uvicorn agent.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1 --log-level info"
healthcheckPath  = "/health"
healthcheckTimeout = 60          # seconds — allow time for sentence-transformers to load
restartPolicyType  = "ON_FAILURE"
restartPolicyMaxRetries = 5
